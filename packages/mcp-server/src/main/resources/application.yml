spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mcp_library}
    username: ${DB_USER:mcp}
    password: ${DB_PASSWORD:mcp}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6334}

server:
  port: 8080
