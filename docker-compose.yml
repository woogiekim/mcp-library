version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mcp_library
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d mcp_library"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: ./packages/mcp-server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mcp_library
      DB_USER: mcp
      DB_PASSWORD: mcp
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6334"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  web-app:
    build:
      context: ./packages/web-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      MCP_SERVER_URL: http://mcp-server:8080
    depends_on:
      - mcp-server

volumes:
  postgres_data:
  qdrant_data:
